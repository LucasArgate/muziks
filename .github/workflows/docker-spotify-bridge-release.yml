name: Docker — spotify-bridge (release)

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: docker-spotify-bridge-release-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: muziks/spotify-bridge

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag_version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "tag_plain=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/spotify-bridge/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.tag_version }}
            ${{ env.IMAGE }}:${{ steps.version.outputs.tag_plain }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.tag_plain }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
